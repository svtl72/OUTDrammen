<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OUT Drammen</title>
    <style>
        :root { --primary: #2563eb; --success: #059669; --bg: #f8fafc; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .app-card { width: 100%; max-width: 480px; background: white; min-height: 100vh; padding: 20px; box-sizing: border-box; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { font-size: 24px; color: #1e293b; text-align: center; margin-bottom: 20px; border-bottom: 3px solid var(--primary); padding-bottom: 10px; font-weight: 800; }
        label { font-weight: 700; display: block; margin: 15px 0 8px 0; color: #475569; font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; }
        select, input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; background-color: white; box-sizing: border-box; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .btn-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
        .type-btn { background: white; border: 2px solid #e2e8f0; padding: 12px 5px; border-radius: 10px; font-weight: 600; cursor: pointer; color: #64748b; font-size: 13px; transition: 0.1s; }
        .type-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 8px rgba(37, 99, 235, 0.2); }
        .tema-section { display: none; } 
        .tema-select { height: 150px; }
        .save-btn { background: var(--success); color: white; width: 100%; padding: 20px; border: none; border-radius: 16px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 25px; }
        #status { text-align: center; margin-top: 15px; font-weight: 600; color: var(--success); display: none; }
        small { color: #64748b; font-size: 10px; display: block; margin-top: -5px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>OUT Drammen 🚶‍♂️</h1>
    
    <label>Bydel</label>
    <select id="bydel">
        <option value="Bragernes">Bragernes</option>
        <option value="Gulskogen">Gulskogen</option>
        <option value="Konnerud">Konnerud</option>
        <option value="Krogstadelva">Krogstadelva</option>
        <option value="Mjøndalen">Mjøndalen</option>
        <option value="Solbergelva">Solbergelva</option>
        <option value="Strømsø">Strømsø</option>
        <option value="Åskollen">Åskollen</option>
        <option value="Åssiden">Åssiden</option>
    </select>

    <label>Ungdomsklubb</label>
    <select id="lokasjon">
        <option value="G60">G60</option>
        <option value="FELLESVERKET">FELLESVERKET</option>
        <option value="NEON">NEON</option>
        <option value="DOWN UNDER">DOWN UNDER</option>
        <option value="UNDERGRUNN">UNDERGRUNN</option>
        <option value="SKATTEKAMMERET">SKATTEKAMMERET</option>
        <option value="NØSTEDHALLEN">NØSTEDHALLEN</option>
    </select>

    <label>Type treff</label>
    <div class="btn-grid">
        <button type="button" class="type-btn contact-btn" onclick="velgVerdi(this, 'contact', 'Enkel')">ENKEL</button>
        <button type="button" class="type-btn contact-btn" onclick="velgVerdi(this, 'contact', 'Omfattende')">OMFATTENDE</button>
    </div>

    <div id="temaSection" class="tema-section">
        <label>Temaer</label>
        <small>(Velg ett eller flere temaer)</small>
        <select id="tema" class="tema-select" multiple>
            <option value="Alkohol">Alkohol</option>
            <option value="Bolig">Bolig</option>
            <option value="Cannabis">Cannabis</option>
            <option value="Familie">Familie</option>
            <option value="Forhold">Forhold</option>
            <option value="Fremtid">Fremtid</option>
            <option value="Fritidsaktiviteter">Fritidsaktiviteter</option>
            <option value="Fysisk helse">Fysisk helse</option>
            <option value="Gjeld">Gjeld</option>
            <option value="Graviditet">Graviditet</option>
            <option value="Hjelpeapparat">Hjelpeapparat</option>
            <option value="Informasjonsarbeid">Informasjonsarbeid</option>
