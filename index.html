<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OUT Drammen</title>
    <style>
        :root { --blue: #2563eb; --green: #059669; --light: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background: var(--light); margin: 0; padding-bottom: 100px; }
        .container { max-width: 450px; margin: 0 auto; padding: 20px; background: white; min-height: 100vh; }
        h1 { text-align: center; color: #1e293b; border-bottom: 2px solid var(--blue); padding-bottom: 10px; margin-top: 0; }
        label { font-weight: bold; display: block; margin: 15px 0 5px 0; font-size: 13px; color: #475569; }
        select, input { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        /* Knapper */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 5px; }
        .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
        .btn { 
            background: white; border: 2px solid #cbd5e1; padding: 15px 5px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; color: #64748b; font-size: 14px;
        }
        
        /* Denne stilen TVINGER knappen til å bli blå */
        .btn.active { 
            background-color: #2563eb !important; 
            color: white !important; 
            border-color: #1e40af !important; 
        }

        #temaSeksjon { display: none; background: #f1f5f9; padding: 15px; border-radius: 8px; margin: 10px 0; }
        
        /* BUNNMENY FOR LAGRE-KNAPP */
        .footer { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: white; padding: 15px; border-top: 2px solid #e2e8f0;
            display: flex; justify-content: center; z-index: 100;
        }
        .save-btn { 
            background: #059669; color: white; border: none; width: 100%; max-width: 400px;
            padding: 18px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer;
        }
        #status { color: var(--green); text-align: center; font-weight: bold; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>OUT Drammen 🚶‍♂️</h1>
    
    <label>Bydel</label>
    <select id="bydel">
        <option value="Bragernes">Bragernes</option>
        <option value="Gulskogen">Gulskogen</option>
        <option value="Konnerud">Konnerud</option>
        <option value="Krogstadelva">Krogstadelva</option>
        <option value="Mjøndalen">Mjøndalen</option>
        <option value="Solbergelva">Solbergelva</option>
        <option value="Strømsø">Strømsø</option>
        <option value="Åskollen">Åskollen</option>
        <option value="Åssiden">Åssiden</option>
    </select>

    <label>Ungdomsklubb</label>
    <select id="lokasjon">
        <option value="-------">-------</option>
        <option value="G60">G60</option>
        <option value="FELLESVERKET">FELLESVERKET</option>
        <option value="NEON">NEON</option>
        <option value="DOWN UNDER">DOWN UNDER</option>
        <option value="UNDERGRUNN">UNDERGRUNN</option>
        <option value="SKATTEKAMMERET">SKATTEKAMMERET</option>
        <option value="NØSTEDHALLEN">NØSTEDHALLEN</option>
    </select>

    <label>Type treff</label>
    <div class="grid">
        <button type="button" class="btn t-btn" onclick="velg('t', 'Enkel', this)">ENKEL</button>
        <button type="button" class="btn t-btn" onclick="velg('t', 'Omfattende', this)">OMFATTENDE</button>
    </div>

    <div id="temaSeksjon">
        <label>Temaer (Velg flere)</label>
        <select id="tema" style="height:120px" multiple>
            <option value="Alkohol">Alkohol</option>
            <option value="Bolig">Bolig</option>
            <option value="Cannabis">Cannabis</option>
            <option value="Familie">Familie</option>
            <option value="Forhold">Forhold</option>
            <option value="Fremtid">Fremtid</option>
            <option value="Fysisk helse">Fysisk helse</option>
            <option value="Psykisk helse">Psykisk helse</option>
            <option value="Rusmidler">Rusmidler</option>
            <option value="Vold">Vold</option>
        </select>
    </div>

    <label>Kjønn</label>
    <div class="grid grid-3">
        <button type="button" class="btn k-btn" onclick="velg('k', 'JENTE', this)">JENTE</button>
        <button type="button" class="btn k-btn" onclick="velg('k', 'GUTT', this)">GUTT</button>
        <button type="button" class="btn k-btn" onclick="velg('k', 'ANNET', this)">ANNET</button>
    </div>

    <label>Alder</label>
    <div class="grid">
        <button type="button" class="btn a-btn" onclick="velg('a', 'B-SKOLE', this)">B-SKOLE</button>
        <button type="button" class="btn a-btn" onclick="velg('a', 'U-SKOLE', this)">U-SKOLE</button>
        <button type="button" class="btn a-btn" onclick="velg('a', 'VGS', this)">VGS</button>
        <button type="button" class="btn a-btn" onclick="velg('a', '18-25 år', this)">18-25 ÅR</button>
    </div>

    <label>Antall ungdommer</label>
    <input type="text" id="antall" placeholder="Eks: 5">
    <div id="status">✅ Lagret i Sheets!</div>
</div>

<div class="footer">
    <button type="button" class="save-btn" id="s-btn" onclick="sendInn()">LAGRE REGISTRERING</button>
</div>
