<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OUT Drammen</title>
    <style>
        :root { --primary: #2563eb; --success: #059669; --bg: #f8fafc; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .app-card { width: 100%; max-width: 480px; background: white; min-height: 100vh; padding: 25px; box-sizing: border-box; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { font-size: 24px; color: #1e293b; text-align: center; margin-bottom: 20px; border-bottom: 3px solid var(--primary); padding-bottom: 10px; font-weight: 800; }
        label { font-weight: 700; display: block; margin: 15px 0 8px 0; color: #475569; font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; }
        select, input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; background-color: white; box-sizing: border-box; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
        .type-btn { background: white; border: 2px solid #e2e8f0; padding: 15px 5px; border-radius: 10px; font-weight: 600; cursor: pointer; color: #64748b; font-size: 14px; transition: 0.2s; }
        .type-btn.active { background: var(--primary) !important; color: white !important; border-color: var(--primary) !important; box-shadow: 0 4px 8px rgba(37, 99, 235, 0.3); }
        .tema-section { display: none; margin-top: 10px; background: #f1f5f9; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .tema-select { height: 180px; margin-top: 5px; }
        .save-btn { background: var(--success); color: white; width: 100%; padding: 20px; border: none; border-radius: 16px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; display: block; }
        #status { text-align: center; margin-top: 15px; font-weight: 600; color: var(--success); display: none; }
        small { color: #64748b; font-size: 10px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>OUT Drammen 🚶‍♂️</h1>
    
    <label>Bydel</label>
    <select id="bydel">
        <option value="Bragernes">Bragernes</option>
        <option value="Gulskogen">Gulskogen</option>
        <option value="Konnerud">Konnerud</option>
        <option value="Krogstadelva">Krogstadelva</option>
        <option value="Mjøndalen">Mjøndalen</option>
        <option value="Solbergelva">Solbergelva</option>
        <option value="Strømsø">Strømsø</option>
        <option value="Åskollen">Åskollen</option>
        <option value="Åssiden">Åssiden</option>
    </select>

    <label>Ungdomsklubb</label>
    <select id="lokasjon">
        <option value="-------">-------</option>
        <option value="G60">G60</option>
        <option value="FELLESVERKET">FELLESVERKET</option>
        <option value="NEON">NEON</option>
        <option value="DOWN UNDER">DOWN UNDER</option>
        <option value="UNDERGRUNN">UNDERGRUNN</option>
        <option value="SKATTEKAMMERET">SKATTEKAMMERET</option>
        <option value="NØSTEDHALLEN">NØSTEDHALLEN</option>

    <label>Type treff</label>

        <button type="button" class="type-btn contact-btn" onclick="velgVerdi(this, 'contact', 'Omfattende')">OMFATTENDE</button>
    </div>

    <div id="temaSection" class="tema-section">
        <label>Temaer</label>
        <small>(Hold inne eller dra for å velge flere)</small>
        <select id="tema" class="tema-select" multiple>
            <option value="Alkohol">Alkohol</option>
            <option value="Bolig">Bolig</option>
            <option value="Cannabis">Cannabis</option>
            <option value="Familie">Familie</option>
            <option value="Forhold">Forhold</option>
            <option value="Fremtid">Fremtid</option>
            <option value="Fritidsaktiviteter">Fritidsaktiviteter</option>
            <option value="Fysisk helse">Fysisk helse</option>
            <option value="Gjeld">Gjeld</option>
            <option value="Graviditet">Graviditet</option>
            <option value="Hjelpeapparat">Hjelpeapparat</option>
            <option value="Informasjonsarbeid">Informasjonsarbeid</option>
            <option value="Jobb">Jobb</option>
            <option value="Kriminalitet">Kriminalitet</option>
            <option value="Mobbing">Mobbing</option>
            <option value="Opphold">Opphold</option>
            <option value="Psykisk helse">Psykisk helse</option>
            <option value="Rasisme">Rasisme</option>
            <option value="Rusmidler">Rusmidler</option>
            <option value="Seksualitet">Seksualitet</option>
            <option value="Vold">Vold</option>
            <option value="Økonomi">Økonomi</option>
        </select>
    </div>

    <label>Kjønn</label>
    <div class="btn-grid btn-grid-3">
        <button type="button" class="type-btn gender-btn" onclick="velgVerdi(this, 'gender', 'JENTE')">JENTE</button>
        <button type="button" class="type-btn gender-btn" onclick="velgVerdi(this, 'gender', 'GUTT')">GUTT</button>
        <button type="button" class="type-btn gender-btn" onclick="velgVerdi(this, 'gender', 'ANNET')">ANNET</button>
    </div>

    <label>Alder</label>
    <div class="btn-grid">
        <button type="button" class="type-btn age-btn" onclick="velgVerdi(this, 'age', 'B-SKOLE')">B-SKOLE</button>
        <button type="button" class="type-btn age-btn" onclick="velgVerdi(this, 'age', 'U-SKOLE')">U-SKOLE</button>
        <button type="button" class="type-btn age-btn" onclick="velgVerdi(this, 'age', 'VGS')">VGS</button>
        <button type="button" class="type-btn age-btn" onclick="velgVerdi(this, 'age', '18-25 år')">18-25 ÅR</button>
    </div>

    <label>Antall ungdommer</label>
    <input type="text" id="antall" placeholder="Antall eller tekst...">

    <button class="save-btn" id="submitBtn" onclick="sendData()">LAGRE REGISTRERING</button>
    <div id="status">✅ Loggført i Google Sheets!</div>
</div>

<script>
    let valgtKjønn = "";
    let valgtAlder = "";
    let valgtKontakt = "";

    function velgVerdi(btn, type, verdi) {
        const buttons = document.querySelectorAll('.' + type + '-btn');
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        if(type === 'contact') {
            valgtKontakt = verdi;
            const temaSection = document.getElementById('temaSection');
            temaSection.style.display = (verdi === 'Omfattende') ? 'block' : 'none';
        }
        else if(type === 'gender') valgtKjønn = verdi;
        else if(type === 'age') valgtAlder = verdi;
    }

        const lokasjon = document.getElementById('lokasjon').value;

            return;
        }
